    required_patterns:
      - "stable IDs deterministic dates MOCK fixtures"
    enforced_by:
      - scripts/check-deterministic-seeds.mjs
      - scripts/check-test-env-safety.mjs
      - scripts/check-no-unsafe-randomness.mjs
    evidence_required: fixture builders + seed scripts review + deterministic-seeds gate log + no-unsafe-randomness gate log
    status: active
    owner: engineering
    notes: >
      check-deterministic-seeds.mjs enforces PII patterns, non-determinism
      (Math.random/Date.now/new Date) and stable seed-* IDs across
      shared/test-seeds and server/seeds. check-no-unsafe-randomness.mjs
      additionally blocks Math.random in runtime code paths
      (shared/contracts, server/**, client/src/**) — opt-out per line via
      `// allow: Math.random — <reason>`. Both gates run via rules:check and
      guards:runtime-invariants.

  # === MANDATORY TASK FINALIZATION ===

  - id: PX-GOV-FINALIZE-001
    title: Successful tasks must be committed, pushed and opened as PR
    severity: P0
    category: governance
    source_docs:
      - docs/governance/AGENT_COMMAND_STANDARD.md
      - docs/governance/AI_AGENT_PERMISSIONS_POLICY.md
    applies_to: [agent-output, PRs]
    forbidden_patterns:
      - "ending successful task with local uncommitted changes"
      - "committing failing gates"
      - "pushing directly to main"
      - "force push"
      - "--no-verify"
      - "committing secrets/build artefacts/logs/ZIPs/node_modules/dist/coverage"
      - "merging PR without controlled auto-merge eligibility check"
    required_patterns:
      - "successful task ends with commit + push + PR (create or update)"
      - "agent final response includes FINALIZATION block"
    enforced_by:
      - scripts/check-successful-task-finalization-docs.mjs
      - manual_gate
    evidence_required:
      - gate results
      - commit SHA
      - pushed branch
      - PR link (created or updated)
      - clean working tree after commit
      - FINALIZATION block in the agent response
    status: active
    owner: governance
    notes: >
      Documentation guard ensures AGENT_COMMAND_STANDARD §11,
      AI_AGENT_PERMISSIONS_POLICY (Mandatory Task Finalization),
      RULES_REGISTRY (this entry) and RULES_TO_GUARDS_MATRIX all stay aligned
      so the policy cannot quietly disappear from any one place.
      Per-task finalization itself stays manual_gate — automating "did the
      agent actually create the PR" would require parsing every agent turn.
