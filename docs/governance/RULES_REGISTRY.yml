      - docs/architecture/PlatformaX-V2-domain-status.md
    applies_to: [reports, status-docs]
    forbidden_patterns:
      - "VISUAL_DONE without screenshot or manual evidence"
      - "agent requiring screenshots when status is MANUAL_OWNER_REVIEW"
      - "agent self-declaring VISUAL_DONE"
    required_patterns:
      - "MANUAL_OWNER_REVIEW or MANUAL_REVIEW_REQUIRED can use owner manual review as evidence"
    enforced_by:
      - scripts/check-fake-done.mjs
