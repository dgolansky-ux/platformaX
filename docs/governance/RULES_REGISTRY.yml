    owner: product
    notes: null

  - id: PX-PROFILE-002
    title: Professional profile is layer of personal profile in identity
    severity: P1
    category: profile
    source_docs:
      - docs/profile/PROFILE_BLUEPRINT_MOBILE_FIRST.md
      - docs/profile/PROFILE_RUNTIME_LOGIC_BLUEPRINT_FROM_LEGACY.md
    applies_to: [server/domains-v2/identity, client/src/features-v2/identity]
