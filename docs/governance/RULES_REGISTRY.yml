    enforced_by:
      - manual_gate
    evidence_required: domain structure review
    status: active
    owner: architecture
    notes: null

  # === INFRASTRUCTURE RULES ===

  - id: PX-INFRA-001
    title: No Railway without separate decision
    severity: P0
    category: infrastructure
    source_docs:
      - docs/ai/AI_FORBIDDEN_ACTIONS.md
      - docs/ai/RAILWAY_DEPLOY_POLICY.md
    applies_to: [deployment, CI, agent]
    forbidden_patterns:
      - "railway deploy without approval"
      - "railway up without approval"
    required_patterns: []
    enforced_by:
      - scripts/check-ai-agent-permissions.mjs
      - manual_gate
    evidence_required: ADR or owner approval
    status: active
    owner: infrastructure
    notes: null

  - id: PX-INFRA-002
    title: No live db push/migration without separate decision
    severity: P0
    category: infrastructure
    source_docs:
      - docs/ai/AI_FORBIDDEN_ACTIONS.md
      - docs/ai/SUPABASE_ACCESS_POLICY.md
    applies_to: [database, migration, agent]
    forbidden_patterns:
      - "supabase db push without approval"
      - "live migration without approval"
    required_patterns: []
    enforced_by:
