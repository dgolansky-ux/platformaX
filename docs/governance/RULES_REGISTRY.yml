  # === AI AGENT RULES ===

  - id: PX-AI-001
    title: Agent must read governance first
    severity: P0
    category: ai-agent
    source_docs:
      - docs/ai/AGENT_OPERATING_STANDARD.md
    applies_to: [agent]
    forbidden_patterns:
      - "agent starts work without reading governance docs"
    required_patterns:
      - "baseline before work includes docs read"
    enforced_by:
      - manual_gate
    evidence_required: baseline section in report
    status: active
    owner: governance
    notes: null

  - id: PX-AI-002
    title: Agent must self-audit before DONE
    severity: P0
    category: ai-agent
    source_docs:
      - docs/ai/AGENT_SELF_AUDIT_PROTOCOL.md
    applies_to: [agent, reports]
    forbidden_patterns:
      - "report without SELF-AUDIT section"
    required_patterns:
      - "12-field self-audit in every Step 17+ report"
    enforced_by:
      - scripts/check-self-audit-evidence.mjs
    evidence_required: self-audit section in report
    status: active
    owner: governance
    notes: null

  - id: PX-AI-003
    title: Agent must stop as BLOCKED when rules conflict
    severity: P0
    category: ai-agent
    source_docs:
      - docs/ai/AI_FORBIDDEN_ACTIONS.md
      - docs/ai/AI_ALLOWED_ACTIONS.md
    applies_to: [agent]
    forbidden_patterns:
      - "agent forces completion when blocked"
      - "agent simulates confidence without evidence"
    required_patterns:
      - "BLOCKED status with reason when rules conflict"
    enforced_by:
      - manual_gate
    evidence_required: BLOCKED status in report
    status: active
    owner: governance
    notes: null
