  - id: PX-SEED-001
    title: Dev and test seeds must be deterministic and PII-safe
    severity: P1
    category: governance
    source_docs:
      - docs/architecture/PlatformaX-V2-active-rules.md
      - docs/architecture/PlatformaX-V2-coding-standards.md
    applies_to: [scripts, tests, fixtures]
