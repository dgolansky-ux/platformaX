  - id: PX-MEDIA-001
    title: No base64/dataUrl/readAsDataURL runtime uploads
    severity: P0
    category: media
    source_docs:
      - docs/architecture/PlatformaX-V2-active-rules.md
      - docs/architecture/PlatformaX-V2-architecture-enforcement.md
    applies_to: [client, server]
    forbidden_patterns:
      - "base64 upload runtime"
      - "readAsDataURL"
      - "dataUrl upload"
    required_patterns:
      - "media uploads via media domain presigned upload"
    enforced_by:
      - scripts/check-media-base64.mjs
    evidence_required: gate log
    status: active
    owner: architecture
    notes: null

  # === LIST/FEED RULES ===

  - id: PX-LIST-001
    title: Runtime lists/feed/search require limit/cursor/fixed cap
    severity: P0
    category: scalability
    source_docs:
      - docs/architecture/PlatformaX-V2-active-rules.md
      - docs/architecture/PlatformaX-V2-architecture-enforcement.md
    applies_to: [server, client runtime lists]
    forbidden_patterns:
      - "fetch-all runtime endpoints"
      - "unbounded list without limit"
    required_patterns:
      - "limit + maxLimit + cursor or fixed cap"
    enforced_by:
      - scripts/check-pagination.mjs
      - scripts/check-scalability-patterns.mjs
    evidence_required: gate log
    status: active
    owner: architecture
    notes: null

  # === PROFILE RULES ===

  - id: PX-PROFILE-001
