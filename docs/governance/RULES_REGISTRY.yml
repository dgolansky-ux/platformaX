    applies_to: [client]
    forbidden_patterns:
      - "React component exceeding 140 lines"
    required_patterns: []
    enforced_by:
      - scripts/check-file-complexity.mjs
      - scripts/check-code-quality-structure.mjs
      - scripts/check-file-size-limits.mjs
    evidence_required: gate log
    status: active
    owner: engineering
    notes: null

  - id: PX-CODE-003
    title: No as any without exception block
    severity: P1
    category: code-quality
    source_docs:
      - docs/architecture/PlatformaX-V2-coding-standards.md
    applies_to: [server, client]
    forbidden_patterns:
      - "as any without PLATFORMAX_EXCEPTION block"
    required_patterns: []
    enforced_by:
      - scripts/check-code-quality-structure.mjs
    evidence_required: gate log
    status: active
    owner: engineering
    notes: null

  - id: PX-CODE-004
    title: No transition all in CSS
    severity: P2
    category: code-quality
    source_docs:
      - docs/architecture/PlatformaX-V2-coding-standards.md
    applies_to: [client/CSS]
    forbidden_patterns:
