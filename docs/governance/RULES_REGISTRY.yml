# PlatformaX V2 — Rules Registry
# Machine-readable canonical registry of all governance rules.
# Every rule has a unique stable ID.

rules:

  # === P0 GOVERNANCE HARD RULES ===

  - id: PX-GOV-001
    title: No fake DONE
    severity: P0
    category: governance
    source_docs:
      - docs/architecture/PlatformaX-V2-active-rules.md
      - docs/architecture/PlatformaX-V2-domain-status.md
    applies_to: [reports, commits, status-docs, agent-output]
    forbidden_patterns:
      - "DONE without evidence"
      - "final without evidence"
      - "complete without evidence"
      - "clean without evidence"
      - "production-ready without evidence"
    required_patterns:
      - "Status must match evidence"
    enforced_by:
      - scripts/check-fake-done.mjs
      - scripts/check-status-truth-consistency.mjs
    evidence_required: gate log or manual evidence
    status: active
    owner: governance
    notes: null

  - id: PX-GOV-002
    title: No weakened guards
    severity: P0
    category: governance
    source_docs:
      - docs/architecture/PlatformaX-V2-active-rules.md
      - docs/architecture/PlatformaX-V2-coding-standards.md
    applies_to: [scripts, guards, CI, tests]
    forbidden_patterns:
      - "weakening guard regex/threshold/allowlist to pass a task"
      - "deleting tests to get green"
      - "replacing failures with console.warn"
    required_patterns:
      - "guard modification requires red-team test"
    enforced_by:
      - manual_gate
      - scripts/check-script-safety.mjs
    evidence_required: red-team test + step report justification
    status: active
    owner: governance
    notes: null

  - id: PX-GOV-003
    title: No --no-verify
    severity: P0
    category: governance
    source_docs:
      - docs/architecture/PlatformaX-V2-coding-standards.md
      - docs/ai/AI_FORBIDDEN_ACTIONS.md
    applies_to: [git, CI, agent]
    forbidden_patterns:
      - "--no-verify"
      - "git commit --no-verify"
    required_patterns: []
    enforced_by:
      - scripts/check-ai-agent-permissions.mjs
      - manual_gate
    evidence_required: null
    status: active
    owner: governance
    notes: Allowed only with explicit owner approval documented in ADR

  - id: PX-GOV-004
    title: No direct push to main
    severity: P0
    category: governance
    source_docs:
      - docs/architecture/PlatformaX-V2-coding-standards.md
    applies_to: [git, CI, branch-protection]
    forbidden_patterns:
      - "git push origin main"
      - "git push --force"
    required_patterns:
      - "all changes through branch and PR"
    enforced_by:
      - branch-protection
      - scripts/check-ai-agent-permissions.mjs
    evidence_required: null
    status: active
    owner: governance
    notes: null

  - id: PX-GOV-ZIP-001
    title: Audit ZIP must be cross-platform and exclude local agent config
    severity: P0
    category: governance
    source_docs:
      - docs/governance/AGENT_COMMAND_STANDARD.md
      - docs/security/SECRET_HANDLING_POLICY.md
    applies_to: [audit-zip, exports, evidence]
    forbidden_patterns:
      - "ZIP entry path with backslash"
      - ".claude/settings.local.json in audit ZIP"
      - "real .env file in audit ZIP"
      - "missing .env*.example from audit ZIP"
    required_patterns:
      - "forward slash paths"
      - ".claude/settings.example.json included"
      - ".env*.example included"
      - "manifest and validation included"
    enforced_by:
      - scripts/validate-audit-zip.mjs
      - scripts/check-coding-standards-consistency.mjs
    evidence_required: validate-audit-zip gate log
    status: active
    owner: governance
    notes: >
      scripts/create-evidence-zip.mjs produces forward-slash entries and an
      audit-manifest.json; scripts/validate-audit-zip.mjs verifies extracted
      evidence ZIP portability and local-config exclusion.

  - id: PX-GOV-GUARD-PORTABILITY-001
    title: Required guards must work from repo and extracted audit ZIP
    severity: P0
    category: governance
    source_docs:
      - docs/governance/AGENT_COMMAND_STANDARD.md
      - docs/governance/RULES_TO_GUARDS_MATRIX.md
    applies_to: [scripts, guards, audit-zip]
    forbidden_patterns:
      - "guard silently scans zero files when .git is absent"
      - "false PASS on empty scan"
    required_patterns:
      - "fs fallback when git ls-files is unavailable"
      - "non-empty scan assertion for required source roots"
    enforced_by:
      - scripts/check-rules-to-guards-coverage.mjs
      - scripts/check-coding-standards-consistency.mjs
      - scripts/check-guard-portability.mjs
    evidence_required: list-source-files tests + rules coverage gate log
    status: active
    owner: governance
    notes: >
      scripts/lib/list-source-files.mjs provides git ls-files + filesystem
      fallback. Its tests are the portability evidence; the coverage and
      consistency guards prevent false-pass registry/matrix drift.

  # === ARCHITECTURE RULES ===

  - id: PX-ARCH-001
    title: V2-first — no legacy runtime
    severity: P0
    category: architecture
    source_docs:
      - docs/architecture/PlatformaX-V2-active-rules.md
      - docs/architecture/PlatformaX-V2-legacy-containment.md
    applies_to: [server, client, build]
    forbidden_patterns:
      - "runtime import from legacy folders"
      - "active legacy routes"
      - "legacy build chunks in active V2 graph"
    required_patterns: []
    enforced_by:
      - scripts/check-no-legacy-imports.mjs
      - scripts/check-removed-product-areas.mjs
      - scripts/check-build-artifacts.mjs
    evidence_required: gate log
    status: active
    owner: architecture
    notes: null

  - id: PX-ARCH-002
    title: Legacy is source material only
    severity: P0
    category: architecture
    source_docs:
      - docs/architecture/PlatformaX-V2-legacy-containment.md
    applies_to: [server, client, docs]
    forbidden_patterns:
      - "importing legacy runtime"
      - "executing legacy code"
      - "bundling legacy"
    required_patterns: []
    enforced_by:
      - scripts/check-no-legacy-imports.mjs
    evidence_required: gate log
    status: active
    owner: architecture
    notes: null

  - id: PX-ARCH-003
    title: Cross-domain only via public-api/contracts/events/outbox
    severity: P0
    category: architecture
    source_docs:
      - docs/architecture/PlatformaX-V2-active-rules.md
      - docs/architecture/PlatformaX-V2-architecture-enforcement.md
    applies_to: [server/domains-v2]
    forbidden_patterns:
      - "import from ../other-domain/repository"
      - "import from ../other-domain/service"
      - "import from ../other-domain/policy"
      - "import from ../other-domain/router"
      - "import from ../other-domain/mapper"
      - "import from ../other-domain/db/schema"
      - "import from ../other-domain/cache-keys"
    required_patterns:
      - "cross-domain via public-api.ts or contracts.ts or events.ts"
    enforced_by:
      - scripts/audit-domain-boundaries.mjs
      - scripts/check-public-api-surface.mjs
    evidence_required: gate log
    status: active
    owner: architecture
    notes: null

  - id: PX-ARCH-004
    title: No domain internals imports
    severity: P0
    category: architecture
    source_docs:
      - docs/architecture/PlatformaX-V2-architecture-enforcement.md
    applies_to: [server/domains-v2, client/src/features-v2]
    forbidden_patterns:
      - "deep import to another domain's internals"
      - "public-api re-export from ./internal/*"
    required_patterns: []
    enforced_by:
      - scripts/audit-domain-boundaries.mjs
      - scripts/check-public-api-surface.mjs
    evidence_required: gate log
    status: active
    owner: architecture
    notes: null

  - id: PX-ARCH-005
    title: Domain ownership is source of truth
    severity: P1
    category: architecture
    source_docs:
      - docs/architecture/PlatformaX-V2-active-rules.md
      - docs/architecture/DOMAIN_OWNERSHIP_MATRIX.md
    applies_to: [server/domains-v2]
    forbidden_patterns: []
    required_patterns:
      - "each domain owns its data exclusively"
    enforced_by:
      - scripts/check-domain-registry.mjs
      - manual_gate
    evidence_required: domain registry consistency
    status: active
    owner: architecture
    notes: null

  - id: PX-ARCH-006
    title: app-v2 is composition layer only
    severity: P1
    category: architecture
    source_docs:
      - docs/architecture/PlatformaX-V2-architecture-enforcement.md
    applies_to: [client/src/app-v2]
    forbidden_patterns:
      - "domain logic in app-v2"
      - "direct DB/Supabase coupling in app-v2"
    required_patterns: []
    enforced_by:
      - scripts/audit-domain-boundaries.mjs
    evidence_required: gate log
    status: active
    owner: architecture
    notes: null

  - id: PX-ARCH-007
    title: features-v2 isolation — no cross-feature internals
    severity: P1
    category: architecture
    source_docs:
      - docs/architecture/PlatformaX-V2-architecture-enforcement.md
    applies_to: [client/src/features-v2]
    forbidden_patterns:
      - "importing internals of another feature domain"
    required_patterns: []
    enforced_by:
      - scripts/audit-domain-boundaries.mjs
    evidence_required: gate log
    status: active
    owner: architecture
    notes: null

  # === CODING STANDARDS RULES ===

