    severity: P0
    category: security
    source_docs:
      - docs/architecture/PlatformaX-V2-active-rules.md
      - docs/security/SECRET_HANDLING_POLICY.md
    applies_to: [server, client, DTOs, logs]
    forbidden_patterns:
      - "email in public DTO"
      - "phone in public DTO"
      - "dateOfBirth in public DTO"
      - "PII in logs"
    required_patterns: []
    enforced_by:
      - scripts/check-public-dto-pii.mjs
      - scripts/check-logging-pii-security.mjs
    evidence_required: gate log
    status: active
    owner: security
    notes: null

  - id: PX-SEC-002
    title: No secrets in repo/logs/ZIP
    severity: P0
    category: security
    source_docs:
      - docs/security/SECRET_HANDLING_POLICY.md
    applies_to: [repo, logs, bundles, reports]
    forbidden_patterns:
      - "DATABASE_URL in code"
      - "service_role key in code"
      - "JWT secret in code"
      - "real .env committed"
    required_patterns: []
    enforced_by:
      - scripts/check-env-safety.mjs
      - scripts/check-secret-scan.mjs
      - scripts/check-local-secret-scan.mjs
      - scripts/check-diff-safety.mjs
    evidence_required: gate log
    status: active
    owner: security
    notes: null

