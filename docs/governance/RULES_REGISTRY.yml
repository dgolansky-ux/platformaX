  - id: PX-CODE-004
    title: No transition all in CSS
    severity: P2
    category: code-quality
    source_docs:
      - docs/architecture/PlatformaX-V2-coding-standards.md
    applies_to: [client/CSS]
    forbidden_patterns:
      - "transition: all"
    required_patterns:
      - "specific transition properties"
    enforced_by:
      - scripts/check-frontend-performance-patterns.mjs
    evidence_required: gate log
    status: active
    owner: engineering
    notes: null

  - id: PX-CODE-005
    title: No placeholder tests
    severity: P1
    category: code-quality
    source_docs:
      - docs/architecture/PlatformaX-V2-coding-standards.md
    applies_to: [tests, scripts/__tests__, server/domains-v2/*/__tests__]
    forbidden_patterns:
      - "expect(true).toBe(true)"
      - "test name contains placeholder"
      - "expect(mod).toBeDefined() as the only assertion"
      - "test with no real assertions"
    required_patterns: []
    enforced_by:
      - scripts/check-no-placeholder-tests.mjs
    evidence_required: gate log
    status: active
    owner: engineering
    notes: >
      This is a meta-quality rule: scaffolds and guards must ship real assertions.
      The guard is intentionally strict and fails closed.

  # === STATUS / EVIDENCE RULES ===

  - id: PX-STATUS-001
    title: Status truth required — status must match evidence
    severity: P0
    category: status-truth
    source_docs:
      - docs/architecture/PlatformaX-V2-domain-status.md
    applies_to: [reports, status-docs, domain-status]
    forbidden_patterns:
      - "status upgrade without evidence"
    required_patterns:
      - "evidence before status upgrade"
    enforced_by:
      - scripts/check-domain-status.mjs
      - scripts/check-fake-done.mjs
      - scripts/check-status-truth-consistency.mjs
    evidence_required: gate log or manual evidence
    status: active
    owner: governance
    notes: null

  - id: PX-STATUS-002
    title: No VISUAL_DONE without visual evidence; owner manual review allowed
    severity: P0
    category: status-truth
