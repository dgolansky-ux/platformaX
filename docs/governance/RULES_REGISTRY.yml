  # === DATABASE / MIGRATION SAFETY RULES ===

  - id: PX-DB-001
    title: No live db push without separate decision
    severity: P0
    category: infrastructure
    source_docs:
      - docs/ai/AI_FORBIDDEN_ACTIONS.md
