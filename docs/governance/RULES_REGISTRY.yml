    source_docs:
      - docs/architecture/PlatformaX-V2-domain-status.md
    applies_to: [reports, status-docs, domain-status]
    forbidden_patterns:
      - "status upgrade without evidence"
    required_patterns:
      - "evidence before status upgrade"
    enforced_by:
      - scripts/check-domain-status.mjs
      - scripts/check-fake-done.mjs
      - scripts/check-status-truth-consistency.mjs
    evidence_required: gate log or manual evidence
    status: active
    owner: governance
    notes: null

  - id: PX-STATUS-002
    title: No VISUAL_DONE without screenshots/manual evidence
    severity: P0
    category: status-truth
    source_docs:
      - docs/architecture/PlatformaX-V2-domain-status.md
    applies_to: [reports, status-docs]
    forbidden_patterns:
      - "VISUAL_DONE without screenshot or manual evidence"
    required_patterns: []
    enforced_by:
      - scripts/check-fake-done.mjs
      - manual_gate
