    notes: >
      BACKEND_PARTIAL / READ_MODEL_SKELETON. In-memory posts + friend-feed
      foundation: createPost (EMPTY_BODY guard) and listFriendFeed (cursor +
      DEFAULT/MAX limit, canSeePost visibility filter). Feed is scoped to an
      explicit author set (viewer's friends) via PostRepository.listByAuthors —
      NO global feed, NO ranking, NO write fanout. Channels Slice 8 adds
      channel-posts for channel feed + one pinned post per channel; lead
      permissions stay in channels. Channel comments/reactions/topics and DB
      adapter remain out of scope. Channels Slice 9 adds channel-comments and
      channel-reactions submodules with in-memory services, batch counts and
      viewer reaction state; DB adapter remains pending. Slice 12 adds two
      new submodules: `workplace-posts` (workplace micro-feed: owner-only
      publish, cursor + bounded limit, visibility-gated) and
      `workplace-teasers` (friend-feed mini-teaser read-model: dedupe per
      source_post_id, preview-only — never the full post body, scoped to the
      viewer's friend set; private posts skip teaser creation). Friend Feed
      Slice 13 extends `friend-posts` with comments, post/comment like reactions,
      batch interaction summaries, and PII-free event hooks for future
      notifications; storage remains in-memory and transport remains pending.

