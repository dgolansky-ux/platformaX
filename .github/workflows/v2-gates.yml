name: V2 Governance Gates

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  gates:
    name: Check / Lint / Test / Build / Guards
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm check

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: All local guards (umbrella matrix)
        # Covers every guard marked runs_in: ci in
        # docs/governance/GUARDS_REGISTRY.yml (rules:check + the extra guards
        # not wrapped by it). check-guards-registry.mjs verifies this stays
        # true — if a new CI guard is added, this step must reach it.
        run: pnpm guards:all-local

      - name: Architecture check
        run: pnpm arch:check:v2

      - name: Bundle validation (smoke)
        run: pnpm guards:bundle
