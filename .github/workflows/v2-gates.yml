name: V2 Governance Gates

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Three lanes:
#   - STANDARD: every PR / push to main — fast and deterministic. Type, lint
#     (incl. eslint-plugin-boundaries), test, build, custom guards umbrella,
#     architecture tests.
#   - DEEP: STANDARD + dependency-cruiser + Gitleaks. Runs on every PR (matrix
#     entry below) so a forbidden import or new secret blocks merge, but is
#     gated separately so a tool flake does not invalidate the STANDARD lane.
#   - WEEKLY: Knip + dependency graph + audit ZIP via `.github/workflows/v2-weekly-audit.yml`.

jobs:
  standard:
    name: STANDARD — check / lint+boundaries / test / build / guards / arch-tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm check

      - name: Lint (incl. eslint-plugin-boundaries)
        run: pnpm lint

      - name: Test (incl. tests/architecture)
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: All local guards (umbrella matrix)
        # Covers every guard marked runs_in: ci in
        # docs/governance/GUARDS_REGISTRY.yml. check-guards-registry.mjs
        # verifies this stays true.
        run: pnpm guards:all-local

      - name: Architecture check (custom regex umbrella)
        run: pnpm arch:check:v2

      - name: Bundle validation (smoke)
        run: pnpm guards:bundle

  deep:
    name: DEEP — dependency-cruiser + Gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [standard]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Dependency-cruiser
        run: pnpm depcruise:check

      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          config-path: .gitleaks.toml
