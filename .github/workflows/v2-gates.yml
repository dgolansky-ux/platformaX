name: V2 Governance Gates

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  gates:
    name: Check / Lint / Test / Build / Guards
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm check

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Rules check (umbrella gate)
        run: pnpm rules:check

      - name: Architecture check
        run: pnpm arch:check:v2

      - name: Secret scan
        run: pnpm guards:secrets

      - name: Review reports & self-audit
        run: pnpm guards:review

      - name: Bundle validation (smoke)
        run: pnpm guards:bundle
