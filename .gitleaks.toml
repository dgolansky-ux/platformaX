# Gitleaks config â€” PlatformaX V2
#
# Runs PARALLEL_WITH_TOOLING with the existing project-specific secret guards
# (scripts/check-secret-scan.mjs, scripts/check-local-secret-scan.mjs,
# scripts/check-env-safety.mjs, scripts/check-diff-safety.mjs). The custom
# guards stay because they encode PlatformaX-specific rules (banned .env
# files, ZIP path validation, Supabase URL/service-role guards). Gitleaks
# adds broader generic coverage that complements them.
#
# Gitleaks binary is NOT bundled with pnpm â€” install separately on dev/CI:
#   - macOS: brew install gitleaks
#   - Linux: download from https://github.com/gitleaks/gitleaks/releases
#   - CI: gitleaks/gitleaks-action
# The pnpm script wrapper (`pnpm secrets:gitleaks`) noop-passes if the binary
# is not installed locally and explicitly logs that fact, so a developer
# without gitleaks on PATH is not blocked. CI installs it explicitly.

title = "PlatformaX V2 Gitleaks config"

[extend]
# Inherit the default upstream rules (AWS, GCP, GitHub, JWT, PEM, etc.)
useDefault = true

# === Allowlist =============================================================
# Paths and patterns we never want flagged. Test fixtures and the documented
# Gitleaks red-case fixture are explicitly safe.
[[allowlists]]
description = "test fixtures, audit artifacts and documented red-case fixtures"
paths = [
    '''(^|/)__tests__(/|$)''',
    '''(^|/)tests/architecture/fixtures(/|$)''',
    '''(^|/)audit-out(/|$)''',
    '''(^|/)dist(/|$)''',
    '''(^|/)node_modules(/|$)''',
    '''(^|/)coverage(/|$)''',
    '''\.env\.example$''',
    '''\.env\.test\.example$''',
    '''(^|/)pnpm-lock\.yaml$''',
    '''(^|/)package-lock\.json$''',
]

[[allowlists]]
description = "documented fake/example strings used in docs and rule descriptions"
regexes = [
    '''DATABASE_URL=postgres://user:pass@host:5432/db''',  # docs example
    '''service_role''',                                    # rule keyword reference
    '''AKIAIOSFODNN7EXAMPLE''',                            # AWS docs example key
]

# Individual historical findings (secret-scan unit-test fixtures) are
# suppressed in `.gitleaksignore` by their <commit>:<file>:<rule>:<line>
# fingerprint. That is the narrowest mechanism gitleaks v8 offers â€” it
# whitelists the EXACT match shown by `gitleaks detect -v`, never the
# rule globally and never the path globally. Future commits with the
# same fixture shapes carry an inline `// gitleaks:allow` comment in
# scripts/__tests__/secret-scan.test.ts so they do not need new
# fingerprints. Do NOT add a fingerprint for a real secret â€” rotate it.
